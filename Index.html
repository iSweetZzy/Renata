<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para Renata 💜</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Renata 💜</h1>

    <p id="contador"></p>

    <!-- BOTÃO DE MÚSICA -->
    <button onclick="tocarMusica()" id="btnMusica">Tocar música 🎵</button>

    <p>Clique nos poemas… cada um guarda um pedaço do que eu sinto.</p>

    <div class="botoes">
      <button onclick="abrirCarta(1)">Poema 1</button>
      <button onclick="abrirCarta(2)">Poema 2</button>
      <button onclick="abrirCarta(3)">Poema 3</button>
    </div>

    <div id="carta" class="carta hidden">
      <p id="textoPoema"></p>
    </div>

    <div class="pedido">
      <h2>Quer namorar comigo? 💜</h2>
      <button class="sim" onclick="aceitou()">Sim ❤️</button>
      <button class="nao" onclick="fugir(this)">Não 😅</button>
    </div>

    <div id="resposta" class="hidden resposta"></div>

  </div>

  <!-- AUDIO -->
  <audio id="musica" loop>
    <source src="musica.mp3.mp3" type="audio/mp3">
  </audio>

  <script src="script.js"></script>
</body>
</html>
